<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - Asistencias</title>
  <link rel="icon" href="logos/favicon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b0714; /* Deep dark background */
      color: #e2e8f0;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    .admin-header {
      background-color: rgba(26, 16, 60, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #8b5cf6;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .admin-header h1 {
      font-size: 1.5rem;
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .admin-header h1 i { color: #a78bfa; }
    .back-btn {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
      background: rgba(139, 92, 246, 0.1);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: #8b5cf6;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    .spreadsheet-container {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .toolbar {
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .toolbar button {
      background-color: rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .toolbar button:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    .toolbar button.btn-save {
      background-color: #8b5cf6;
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
      transition: all 0.3s ease;
    }
    .toolbar button.btn-save:hover {
      background-color: #7c3aed;
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
    }
    .toolbar button i.fa-file-excel { color: #10b981; }

    .table-wrapper {
      background: rgba(30, 30, 30, 0.4);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      overflow-x: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      /* Custom scrollbar for table */
    }
    .table-wrapper::-webkit-scrollbar {
      height: 10px;
    }
    .table-wrapper::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 0 0 12px 12px;
    }
    .table-wrapper::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.5);
      border-radius: 10px;
    }
    .table-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.8);
    }

    .excel-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    .excel-table th, .excel-table td {
      padding: 1rem;
      text-align: left;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .excel-table th {
      background-color: rgba(0, 0, 0, 0.4);
      font-weight: 600;
      color: #a78bfa;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .excel-table td {
      color: #cbd5e1;
      background-color: transparent;
      transition: background 0.2s;
    }
    .excel-table tbody tr:hover td {
      background-color: rgba(139, 92, 246, 0.05);
    }
    .excel-table td[contenteditable="true"] {
      cursor: text;
      border-radius: 4px;
      border: 1px solid transparent;
    }
    .excel-table td[contenteditable="true"]:focus {
      outline: none;
      background-color: rgba(139, 92, 246, 0.1);
      border: 1px solid #8b5cf6;
      color: white;
    }
    .excel-table td[contenteditable="true"]:empty:before {
      content: attr(placeholder);
      color: rgba(255, 255, 255, 0.2);
      pointer-events: none;
      display: block;
    }

    .select-status {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem;
      border-radius: 6px;
      font-weight: 600;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a78bfa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.5rem center;
      background-size: 1em;
      transition: border-color 0.2s;
    }
    .select-status option {
      background-color: #1a103c;
      color: white;
    }
    .select-status:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    .delete-btn {
      color: #ef4444;
      cursor: pointer;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid transparent;
      font-size: 1rem;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      margin: 0 auto;
    }
    .delete-btn:hover {
      background-color: #ef4444;
      color: white;
      transform: scale(1.1);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 1rem;
        padding: 1.5rem 1rem;
        text-align: center;
      }
      .admin-header h1 {
        font-size: 1.3rem;
        justify-content: center;
      }
      .toolbar {
        justify-content: center;
      }
      .toolbar button {
        flex: 1 1 calc(50% - 0.5rem);
        justify-content: center;
        font-size: 0.85rem;
        padding: 0.8rem 1rem;
      }
      .spreadsheet-container {
        padding: 1rem;
      }
      .table-wrapper {
        margin: 0;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <h1><i class="fa-solid fa-table-list"></i> Registro de Asistencias</h1>
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Volver a la web</a>
  </header>

  <div class="spreadsheet-container">
    <div class="toolbar">
      <button onclick="addRow()"><i class="fa-solid fa-plus"></i> Agregar Fila</button>
      <button class="btn-save" onclick="saveData()"><i class="fa-solid fa-floppy-disk"></i> Guardar Cambios</button>
      <button onclick="exportToCSV()"><i class="fa-solid fa-file-excel"></i> Exportar a Excel</button>
    </div>

    <div class="table-wrapper">
      <table class="excel-table" id="attendanceTable">
        <thead>
          <tr>
            <th style="width: 50px; text-align: center;">#</th>
            <th>Nombre del Alumno</th>
            <th>Teléfono</th>
            <th>Días</th>
            <th>Curso</th>
            <th>Fecha (DD/MM/YYYY)</th>
            <th style="width: 130px;">Asistencia</th>
            <th style="width: 140px;">Pago</th>
            <th style="width: 80px; text-align: center;">Acción</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows will be generated here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const tableBody = document.getElementById('tableBody');
    let rowCount = 0;

    function updateStatusColor(select) {
      if(select.value === 'Presente') select.style.color = '#10b981';
      else if(select.value === 'Ausente') select.style.color = '#ef4444';
      else select.style.color = '#f59e0b';
    }
    
    function updatePaymentColor(select) {
      if(select.value === 'Al Día') select.style.color = '#10b981';
      else if(select.value === 'Atrasado') select.style.color = '#ef4444';
      else select.style.color = '#f59e0b';
    }

    function loadData() {
      const data = JSON.parse(localStorage.getItem('asistenciasData')) || [];
      if (data.length === 0) {
        for(let i=0; i<10; i++) addRow();
      } else {
        data.forEach(rowData => addRow(rowData));
      }
    }

    function addRow(data = {name: '', phone: '', days: '', course: '', date: '', status: 'Presente', payment: 'Al Día'}) {
      data.phone = data.phone || '';
      data.days = data.days || '';
      data.payment = data.payment || 'Al Día';

      rowCount++;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align: center; color: #64748b; font-weight: bold; background: rgba(0,0,0,0.2);">${rowCount}</td>
        <td contenteditable="true" placeholder="Nombre...">${data.name}</td>
        <td contenteditable="true" placeholder="Teléfono...">${data.phone}</td>
        <td contenteditable="true" placeholder="Lunes/Miércoles...">${data.days}</td>
        <td contenteditable="true" placeholder="Peluquería / Barbería">${data.course}</td>
        <td contenteditable="true" placeholder="DD/MM/YYYY">${data.date}</td>
        <td>
          <select class="select-status asistencia-status" onchange="updateStatusColor(this)">
            <option value="Presente" ${data.status === 'Presente' ? 'selected' : ''}>Presente</option>
            <option value="Ausente" ${data.status === 'Ausente' ? 'selected' : ''}>Ausente</option>
            <option value="Tarde" ${data.status === 'Tarde' ? 'selected' : ''}>Tarde</option>
          </select>
        </td>
        <td>
          <select class="select-status payment-status" onchange="updatePaymentColor(this)">
            <option value="Al Día" ${data.payment === 'Al Día' ? 'selected' : ''}>Al Día</option>
            <option value="Atrasado" ${data.payment === 'Atrasado' ? 'selected' : ''}>Atrasado</option>
            <option value="Pendiente" ${data.payment === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
          </select>
        </td>
        <td style="text-align: center; border-bottom: none;">
          <button class="delete-btn" title="Eliminar fila" onclick="this.closest('tr').remove(); updateRowNumbers();"><i class="fa-solid fa-trash"></i></button>
        </td>
      `;
      tableBody.appendChild(tr);

      // Initialize colors
      const newAsistencia = tr.querySelector('.asistencia-status');
      const newPayment = tr.querySelector('.payment-status');
      updateStatusColor(newAsistencia);
      updatePaymentColor(newPayment);
    }

    function updateRowNumbers() {
      const rows = tableBody.querySelectorAll('tr');
      rowCount = 0;
      rows.forEach(row => {
        rowCount++;
        row.querySelector('td:first-child').textContent = rowCount;
      });
    }

    function saveData() {
      const rows = tableBody.querySelectorAll('tr');
      const data = [];
      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        const name = cells[1].textContent.trim();
        if(name !== '') { 
          data.push({
            name: name,
            phone: cells[2].textContent.trim(),
            days: cells[3].textContent.trim(),
            course: cells[4].textContent.trim(),
            date: cells[5].textContent.trim(),
            status: row.querySelector('.asistencia-status').value,
            payment: row.querySelector('.payment-status').value
          });
        }
      });
      localStorage.setItem('asistenciasData', JSON.stringify(data));
      
      // Nice visual feedback instead of alert
      const saveBtn = document.querySelector('.btn-save');
      const originalText = saveBtn.innerHTML;
      saveBtn.innerHTML = '<i class="fa-solid fa-check"></i> ¡Guardado!';
      saveBtn.style.backgroundColor = '#10b981';
      setTimeout(() => {
        saveBtn.innerHTML = originalText;
        saveBtn.style.backgroundColor = '';
      }, 2000);
    }

    function exportToCSV() {
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Alumno,Teléfono,Días,Curso,Fecha,Asistencia,Pago\n";
        
        const rows = tableBody.querySelectorAll('tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            const name = cells[1].textContent.trim();
            if(name !== '') {
                const phone = cells[2].textContent.trim();
                const days = cells[3].textContent.trim();
                const course = cells[4].textContent.trim();
                const date = cells[5].textContent.trim();
                const status = row.querySelector('.asistencia-status').value;
                const payment = row.querySelector('.payment-status').value;
                csvContent += `"${name}","${phone}","${days}","${course}","${date}","${status}","${payment}"\n`;
            }
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "registro_asistencias.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Security Check: Ensure admin logged in
    if(sessionStorage.getItem('adminAuth') !== 'true') {
        window.location.href = 'index.html';
    } else {
        loadData();
    }
  </script>
</body>
</html>
